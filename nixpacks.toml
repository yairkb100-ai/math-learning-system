# Railway / Nixpacks build config for the FastAPI backend.
# Deploy with the Railway service Root Directory set to the REPO ROOT (not
# backend/) so that seed.py can find the sibling courses/ folder.

[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["python -m pip install --upgrade pip", "pip install -r backend/requirements.txt"]

# On each boot: seed content + admin into the database (idempotent), then serve.
[start]
cmd = "cd backend && python seed.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
